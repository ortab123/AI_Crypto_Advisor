<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle inner ring -->
  <rect x="3" y="3" width="58" height="58" rx="12" ry="12"
        fill="none" stroke="url(#coin)" stroke-width="0.8" opacity="0.35"/>

  <!-- ₿ symbol -->
  <text
    x="32" y="46"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="bold"
    fill="url(#coin)"
    filter="url(#glow)"
  >₿</text>
</svg>
